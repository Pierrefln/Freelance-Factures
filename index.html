<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factures Bpifrance</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f4f0;
      --surface:      #ffffff;
      --surface2:     #eeecea;
      --border:       rgba(26,58,107,.12);
      --text:         #0d2044;
      --muted:        #5a6b88;
      --accent:       #1a3a6b;
      --accent-dim:   rgba(26,58,107,.1);
      --success:      #16a34a;
      --danger:       #dc2626;
      --dbg:          rgba(220,38,38,.08);
      --radius:       12px;
      --shadow:       0 1px 3px rgba(13,32,68,.07), 0 8px 32px rgba(13,32,68,.1);
      --input-bg:     #ffffff;
      --input-text:   #0d2044;
      --input-border: #c8cfe0;
      --input-focus:  #1a3a6b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* ── Bubble canvas ────────────────────────────────── */
    #bubble-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top bar ──────────────────────────────────────────── */
    .top-bar {
      background: rgba(245,244,240,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(26,58,107,.1);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar-title::before {
      content: "";
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(26,58,107,.5), 0 0 20px rgba(26,58,107,.3);
    }
    .top-bar-sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      max-width: 800px;
      margin: 36px auto;
      padding: 0 24px 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
      position: relative;
      overflow: visible;
    }
    .section::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(26,58,107,.4) 20%,
        rgba(26,58,107,.8) 50%,
        rgba(26,58,107,.4) 80%,
        transparent 100%);
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 22px;
    }

    /* ── Profile card ─────────────────────────────────────── */
    .profile-layout {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .profile-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }
    .profile-detail {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .profile-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .profile-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(26,58,107,.08);
      border: 1px solid rgba(26,58,107,.2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: .1px;
    }
    .profile-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Period ──────────────────────────────────────────── */
    .period-top { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; margin-bottom: 22px; justify-content: center; }
    .cal-header { text-align: center; }
    .cal-grid   { margin: 0 auto; }
    .field      { display: flex; flex-direction: column; gap: 8px; }
    .field label{ font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: .1px; }

    select, input[type="number"], input[type="text"], input[type="email"], textarea {
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      padding: 12px 14px;
      font: inherit;
      font-size: 14px;
      color: var(--input-text);
      background: var(--input-bg);
      outline: none;
      min-height: 48px;
      transition: border-color .18s, box-shadow .18s;
    }
    select option { background: #ffffff; color: #0f172a; }
    select:focus, input[type="number"]:focus, input[type="text"]:focus,
    input[type="email"]:focus, textarea:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(26,58,107,.15);
    }

    /* ── Calendar ────────────────────────────────────────── */
    .cal-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .7px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      max-width: 308px;
      background: rgba(26,58,107,.03);
      border: 1px solid rgba(26,58,107,.08);
      border-radius: 12px;
      padding: 14px 12px;
    }
    .cal-head {
      text-align: center;
      font-size: 9.5px;
      font-weight: 700;
      color: var(--muted);
      padding: 0 0 8px;
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .cal-day {
      text-align: center;
      padding: 7px 2px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background .12s, color .12s;
      user-select: none;
      font-weight: 400;
    }
    .cal-day:hover  { background: rgba(26,58,107,.1); color: var(--accent); }
    .cal-day.today  { color: var(--accent); font-weight: 700; background: rgba(26,58,107,.07); }
    .cal-day.sel    { background: var(--accent); color: #fff; font-weight: 700; box-shadow: 0 2px 10px rgba(26,58,107,.4); }

    /* ── Invoice rows ─────────────────────────────────────── */
    #rows-container { display: flex; flex-direction: column; gap: 12px; }

    .inv-card {
      border: 1px solid rgba(26,58,107,.1);
      border-radius: 10px;
      padding: 18px 20px;
      background: var(--surface2);
      transition: border-color .18s, box-shadow .18s;
    }
    .inv-card:focus-within { border-color: rgba(26,58,107,.3); box-shadow: 0 0 0 2px rgba(26,58,107,.08); }

    .row-top { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }

    .row-idx {
      width: 22px; height: 22px;
      border: 1px solid rgba(26,58,107,.2);
      border-radius: 50%;
      font-size: 11px; font-weight: 600; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; align-self: center;
    }

    /* ── Autocomplete ─────────────────────────────────────── */
    .ac-wrap { position: relative; flex: 1 1 260px; }
    .ac-wrap label { font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 8px; }

    .ac-input {
      width: 100%;
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      padding: 12px 14px;
      font: inherit; font-size: 14px;
      color: var(--input-text);
      background: var(--input-bg);
      outline: none;
      min-height: 48px;
      transition: border-color .18s, box-shadow .18s;
    }
    .ac-input:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(26,58,107,.15); }
    .ac-input.selected { font-weight: 500; }

    .ac-drop {
      display: none;
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      background: #ffffff;
      border: 1px solid rgba(26,58,107,.15);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(13,32,68,.15);
      z-index: 300;
      min-height: 176px;
      max-height: 340px;
      overflow-y: auto;
    }
    .ac-drop.open { display: block; }
    .ac-item {
      padding: 10px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(26,58,107,.07);
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.hi { background: rgba(26,58,107,.06); }
    .ac-code { font-family: monospace; font-size: 11px; font-weight: 700; color: var(--accent); min-width: 52px; }
    .ac-name { font-size: 13px; color: var(--text); }
    .ac-empty { padding: 14px; text-align: center; color: var(--muted); font-size: 13px; }

    .field-days { width: 80px; }
    .field-days input { width: 100%; }

    .row-total { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; padding-bottom: 1px; min-width: 70px; text-align: right; }

    .btn-remove {
      background: none; border: none; cursor: pointer; color: var(--muted);
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s; flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--danger); background: rgba(220,38,38,.08); }

    .desc-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 9px; background: none; border: none; cursor: pointer;
      font: inherit; font-size: 12px; color: var(--muted); padding: 0;
      transition: color .15s;
    }
    .desc-toggle:hover { color: var(--accent); }

    .desc-box { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(26,58,107,.08); }
    .desc-box label { font-size: 12px; font-weight: 600; color: var(--text); display: block; margin-bottom: 8px; }
    .desc-box textarea {
      width: 100%; border: 1.5px solid var(--input-border); border-radius: 8px;
      padding: 12px 14px; font: inherit; font-size: 13.5px; color: var(--input-text);
      resize: vertical; min-height: 120px; outline: none; line-height: 1.7;
      transition: border-color .18s, box-shadow .18s;
      background: var(--input-bg);
    }
    .desc-box textarea:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(26,58,107,.15); }
    .desc-hint { font-size: 11.5px; color: var(--muted); margin-top: 6px; }


    /* ── Empty state ──────────────────────────────────────── */
    #empty-state { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

    /* ── Bottom bar ───────────────────────────────────────── */
    .bottom-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; position: relative; z-index: 1; }
    .bottom-left { display: flex; align-items: center; gap: 14px; }
    #summary { font-size: 12.5px; color: var(--muted); }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn { border-radius: 8px; cursor: pointer; font: inherit; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent; transition: all .2s ease; }
    .btn-outline { background: rgba(26,58,107,.06); border-color: rgba(26,58,107,.22); color: var(--text); padding: 9px 16px; font-size: 13.5px; }
    .btn-outline:hover { background: var(--accent); border-color: var(--accent); color: #ffffff; box-shadow: 0 4px 14px rgba(26,58,107,.35); transform: translateY(-1px); }
    .btn-outline:active { transform: translateY(0); box-shadow: none; }
    .btn-sm { padding: 7px 13px; font-size: 12.5px; }
    .btn-ghost { background: none; border: none; cursor: pointer; font: inherit; font-size: 12px; color: var(--muted); padding: 0; transition: color .15s; }
    .btn-ghost:hover { color: var(--danger); }
    .btn-gen {
      background: var(--accent);
      color: #ffffff;
      padding: 13px 32px;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid var(--accent);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(26,58,107,.4), 0 1px 0 rgba(255,255,255,.15) inset;
      letter-spacing: -.1px;
    }
    .btn-gen:hover {
      background: #ffffff;
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 18px rgba(26,58,107,.2);
      transform: translateY(-2px);
    }
    .btn-gen:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(26,58,107,.15); }
    .btn-gen:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-danger { background: rgba(220,38,38,.06); border-color: rgba(220,38,38,.25); color: #dc2626; padding: 9px 16px; font-size: 13.5px; }
    .btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ── Profile selector (small) ─────────────────────────── */
    select#profile-select {
      font-size: 12.5px;
      padding: 6px 10px;
      max-width: 210px;
      color: var(--input-text);
      border-color: rgba(26,58,107,.2);
    }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(13,32,68,.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #ffffff;
      border: 1px solid rgba(26,58,107,.12);
      border-radius: 16px;
      box-shadow: 0 40px 120px rgba(13,32,68,.2), 0 0 0 1px rgba(26,58,107,.04);
      padding: 32px 32px 28px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-box::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(26,58,107,.5) 30%, rgba(26,58,107,.9) 50%, rgba(26,58,107,.5) 70%, transparent);
      border-radius: 16px 16px 0 0;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 26px;
      letter-spacing: -.3px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .2px;
    }
    .form-field input, .form-field select {
      width: 100%;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(26,58,107,.08);
    }
    .modal-close-btn {
      position: absolute;
      top: 20px; right: 20px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 20px;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      line-height: 1;
    }
    .modal-close-btn:hover { color: var(--text); background: rgba(26,58,107,.07); }

    /* ── Toast ────────────────────────────────────────────── */
    #toast { position: fixed; bottom: 24px; right: 24px; background: #ffffff; color: var(--text); border-radius: 10px; padding: 12px 18px; font-size: 13.5px; font-weight: 500; max-width: 320px; box-shadow: 0 8px 32px rgba(13,32,68,.15), 0 0 0 1px rgba(26,58,107,.1); opacity: 0; transform: translateY(10px); transition: all .22s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { border-left: 3px solid #16a34a; }
    #toast.err { border-left: 3px solid var(--danger); }

    .tva-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      opacity: .7;
    }

    /* ── Row number badge ─────────────────────────────────── */
    .row-idx {
      background: rgba(26,58,107,.08);
      border: 1px solid rgba(26,58,107,.15);
      color: var(--accent);
      font-size: 11.5px;
    }

    /* ── Row top alignment ────────────────────────────────── */
    .row-top { gap: 12px; }
    .field-days input { min-height: 48px; }

    /* ── Desc toggle ──────────────────────────────────────── */
    .desc-toggle { color: var(--muted); font-size: 12.5px; margin-top: 12px; }
    .desc-toggle:hover { color: var(--accent); }

    /* ── Row total ────────────────────────────────────────── */
    .row-total { color: var(--accent); font-size: 14px; font-weight: 700; }

    /* ── Summary ──────────────────────────────────────────── */
    #summary { color: var(--muted); font-size: 13.5px; }

    /* ── Bottom bar ───────────────────────────────────────── */
    .bottom-bar { padding: 6px 0; gap: 16px; }

    /* ── Empty state ──────────────────────────────────────── */
    #empty-state { padding: 40px; color: var(--muted); font-size: 13.5px; }

    /* ── Tva note ─────────────────────────────────────────── */
    .tva-note { color: var(--muted); font-size: 11.5px; margin-top: 5px; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast { font-size: 14px; }

    /* ── Preview modal ────────────────────────────────────── */
    #preview-modal .modal-overlay { background: rgba(13,32,68,.55); }
    .preview-box {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid rgba(26,58,107,.12);
      width: 100%;
      max-width: 900px;
      height: 92vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 120px rgba(13,32,68,.25);
      overflow: hidden;
      position: relative;
    }
    .preview-box::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(26,58,107,.5) 30%, rgba(26,58,107,.9) 50%, rgba(26,58,107,.5) 70%, transparent);
      border-radius: 16px 16px 0 0;
      z-index: 1;
    }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(26,58,107,.1);
      gap: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .preview-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .preview-nav .btn { padding: 6px 14px; font-size: 16px; line-height: 1; }
    .preview-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .preview-frame-wrap {
      flex: 1;
      overflow: hidden;
      background: #e5e7eb;
      padding: 16px;
    }
    #preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(13,32,68,.2);
      background: #fff;
    }

    /* ── No profile state ─────────────────────────────────── */
    .no-profile-state {
      text-align: center;
      padding: 16px 0;
      color: var(--muted);
      font-size: 13.5px;
    }
    .no-profile-state p { margin-bottom: 14px; }

    @media (max-width: 600px) {
      .top-bar { padding: 12px 16px; }
      main { margin: 20px auto; padding: 0 14px 70px; gap: 16px; }
      .section { padding: 20px 18px; }
      .bottom-bar { flex-direction: column; align-items: stretch; }
      .btn-gen { justify-content: center; }
      .form-grid { grid-template-columns: 1fr; }
      .modal-box { padding: 24px 20px 20px; margin: 12px; }
      .profile-layout { gap: 16px; }
    }
  </style>
</head>
<body>

<canvas id="bubble-canvas"></canvas>

<!-- Top bar (replaces header) -->
<div class="top-bar">
  <div class="top-bar-title">Générateur de Factures</div>
  <div class="top-bar-sub">Bpifrance</div>
</div>

<main>

  <!-- Encart profil -->
  <div class="section">
    <div class="section-title">Profil actif</div>
    <div class="profile-layout">
      <div class="profile-info">
        <div class="profile-name" id="prof-name"></div>
        <div class="profile-detail" id="prof-contact"></div>
        <div class="profile-detail" id="prof-siret"></div>
        <div class="profile-badges">
          <div class="profile-badge" id="prof-tjm"></div>
          <div class="profile-badge" id="prof-tva"></div>
        </div>
      </div>
      <div class="profile-controls">

<script>
// ── Projects ────────────────────────────────────────────────────────────────────
const PROJECTS = {
  "F0084": "PCN EIC",
  "F0110": "ACCESS2EIC",
  "F0116": "Taftie 2020",

  "V0149": "Choose Africa 2 Togo",
  "V0150": "Moldavie Digital & Economic",
  "V0151": "GUINEE FGPE",
  "V0152": "26-Kobo Art",
  "V0153": "ANGOLA – Choose Africa 2",
  "V0154": "Projets Bilatéraux Euroquity",
  "V0155": "TAFTIE",
};

const MONTHS_FR  = ["janvier","février","mars","avril","mai","juin",
                    "juillet","août","septembre","octobre","novembre","décembre"];
const MONTHS_CAP = ["Janvier","Février","Mars","Avril","Mai","Juin",
                    "Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

// ── Profile management ───────────────────────────────────────────────────────
const RECIPIENT = {
  name: "Bpifrance", line1: "27/31 avenue du Général Leclerc",
  line2: "94710 Maisons-Alfort Cedex",
};

function loadProfiles() {
  try {
    const s = localStorage.getItem('profiles');
    if (s) return JSON.parse(s);
  } catch(_) {}
  return [];
}
function saveProfiles() {
  localStorage.setItem('profiles', JSON.stringify(profiles));
}

let profiles = loadProfiles();
let activeProfileIdx = profiles.length > 0
  ? Math.min(parseInt(localStorage.getItem('activeProfileIdx') || '0'), profiles.length - 1)
  : 0;
if (activeProfileIdx < 0) activeProfileIdx = 0;
let editingProfileIdx = -1; // -1 = new profile

function getActiveProfile() { return profiles.length > 0 ? (profiles[activeProfileIdx] || profiles[0]) : null; }

function renderProfileCard() {
  const p = getActiveProfile();
  const pi    = document.querySelector('.profile-info');
  const ctrls = document.querySelector('.profile-controls');

  if (!p) {
    pi.innerHTML = `<div class="no-profile-state"><p>Aucun profil configuré — vos données restent sur votre appareil.</p><button class="btn btn-outline" onclick="openProfileModal(-1)">+ Créer mon profil</button></div>`;
    if (ctrls) ctrls.style.display = 'none';
    return;
  }

  // Restore profile-info if it was replaced by the no-profile placeholder
  if (pi.querySelector('.no-profile-state')) {
    pi.innerHTML = `
      <div class="profile-name" id="prof-name"></div>
      <div class="profile-detail" id="prof-contact"></div>
      <div class="profile-detail" id="prof-siret"></div>
      <div class="profile-badges">
        <div class="profile-badge" id="prof-tjm"></div>
        <div class="profile-badge" id="prof-tva"></div>
      </div>`;
  }
  if (ctrls) ctrls.style.display = '';

  document.getElementById('prof-name').textContent = p.prenom + ' ' + p.nom;
  document.getElementById('prof-contact').textContent = p.tel + (p.email ? '  ·  ' + p.email : '');
  document.getElementById('prof-siret').textContent = 'SIRET : ' + p.siret;
  document.getElementById('prof-tjm').textContent = p.tjm + ' € / jour';
  const tvaLabel = p.tva === '0' ? 'TVA non applicable' : 'TVA ' + p.tva + ' %';
  document.getElementById('prof-tva').textContent = tvaLabel;
  refreshSummary();
}

function renderProfileSelect() {
  const sel = document.getElementById('profile-select');
  if (profiles.length === 0) { sel.innerHTML = ''; sel.style.display = 'none'; return; }
  sel.style.display = '';
  sel.innerHTML = profiles.map((p, i) =>
    `<option value="${i}"${i === activeProfileIdx ? ' selected' : ''}>${p.prenom} ${p.nom}</option>`
  ).join('');
}

function switchProfile(idx) {
  activeProfileIdx = idx;
  localStorage.setItem('activeProfileIdx', idx);
  renderProfileCard();
}

function openProfileModal(idx) {
  editingProfileIdx = idx;
  const isNew = idx === -1;
  document.getElementById('modal-title').textContent = isNew ? 'Nouveau profil' : 'Modifier le profil';

  const p = isNew ? {} : profiles[idx];
  document.getElementById('f-prenom').value = p.prenom || '';
  document.getElementById('f-nom').value    = p.nom    || '';
  document.getElementById('f-adresse').value= p.adresse|| '';
  document.getElementById('f-ville').value  = p.ville  || '';
  document.getElementById('f-tel').value    = p.tel    || '';
  document.getElementById('f-email').value  = p.email  || '';
  document.getElementById('f-siret').value  = p.siret  || '';
  document.getElementById('f-iban').value   = p.iban   || '';
  document.getElementById('f-bic').value    = p.bic    || '';
  document.getElementById('f-tjm').value    = p.tjm != null ? p.tjm : '';
  document.getElementById('f-tva').value    = p.tva    || '0';

  // Signature preview
  const sigInput = document.getElementById('f-signature');
  sigInput.value = '';
  delete sigInput.dataset.b64;
  const sigWrap = document.getElementById('sig-preview-wrap');
  if (p.signature) {
    document.getElementById('sig-preview').src = p.signature;
    sigInput.dataset.b64 = p.signature;
    sigWrap.style.display = 'flex';
  } else {
    sigWrap.style.display = 'none';
  }

  // Delete button (only for existing non-last profiles)
  const wrap = document.getElementById('modal-delete-wrap');
  if (!isNew && profiles.length > 1) {
    wrap.innerHTML = `<button class="btn btn-danger" onclick="deleteProfile(${idx})">Supprimer</button>`;
  } else {
    wrap.innerHTML = '';
  }

  document.getElementById('profile-modal').classList.add('open');
}

function closeProfileModal() {
  document.getElementById('profile-modal').classList.remove('open');
}

function previewSignature(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result;
    document.getElementById('sig-preview').src = b64;
    document.getElementById('sig-preview-wrap').style.display = 'flex';
    input.dataset.b64 = b64;
  };
  reader.readAsDataURL(input.files[0]);
}

function clearSignature() {
  const input = document.getElementById('f-signature');
  input.value = '';
  delete input.dataset.b64;
  document.getElementById('sig-preview-wrap').style.display = 'none';
}

function saveProfile() {
  const prenom = document.getElementById('f-prenom').value.trim();
  const nom    = document.getElementById('f-nom').value.trim();
  if (!prenom || !nom) { showToast('Prénom et nom obligatoires.', 'err'); return; }
  const siret  = document.getElementById('f-siret').value.trim();
  if (!siret)  { showToast('SIRET obligatoire.', 'err'); return; }

  const p = {
    id: editingProfileIdx === -1 ? Date.now() : profiles[editingProfileIdx].id,
    prenom,
    nom,
    adresse: document.getElementById('f-adresse').value.trim(),
    ville:   document.getElementById('f-ville').value.trim(),
    tel:     document.getElementById('f-tel').value.trim(),
    email:   document.getElementById('f-email').value.trim(),
    siret,
    iban:    document.getElementById('f-iban').value.trim(),
    bic:     document.getElementById('f-bic').value.trim(),
    tjm:     parseFloat(document.getElementById('f-tjm').value) || 0,
    tva:       document.getElementById('f-tva').value,
    signature: document.getElementById('f-signature').dataset.b64
               || (editingProfileIdx !== -1 ? (profiles[editingProfileIdx].signature || '') : ''),
  };

  if (editingProfileIdx === -1) {
    profiles.push(p);
    activeProfileIdx = profiles.length - 1;
  } else {
    profiles[editingProfileIdx] = p;
  }

  saveProfiles();
  localStorage.setItem('activeProfileIdx', activeProfileIdx);
  renderProfileSelect();
  renderProfileCard();
  closeProfileModal();
  showToast('Profil enregistré ✓');
}

function deleteProfile(idx) {
  if (profiles.length <= 1) { showToast('Impossible de supprimer le dernier profil.', 'err'); return; }
  profiles.splice(idx, 1);
  if (activeProfileIdx >= profiles.length) activeProfileIdx = profiles.length - 1;
  saveProfiles();
  localStorage.setItem('activeProfileIdx', activeProfileIdx);
  renderProfileSelect();
  renderProfileCard();
  closeProfileModal();
  showToast('Profil supprimé.');
}

// Close modal on overlay click
document.getElementById('profile-modal').addEventListener('click', function(e) {
  if (e.target === this) closeProfileModal();
});

// ── State ───────────────────────────────────────────────────────────────────────
let rowId      = 0;
const rowState = {};
let invoiceDay = new Date().getDate();

// ── Init ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const t = new Date();
  document.getElementById('sel-month').value = t.getMonth() + 1;
  document.getElementById('inp-year').value  = t.getFullYear();
  renderProfileSelect();
  renderProfileCard();
  renderCalendar();
  addRow();
});

// ── Formatters ────────────────────────────────────────────────────────────────
function fmtUI(v)  { return v.toLocaleString('fr-FR') + ' €'; }
function fmtPDF(v) {
  const s = Math.round(v);
  return (s >= 1000
    ? Math.floor(s/1000) + ' ' + String(s%1000).padStart(3,'0')
    : String(s)) + ' €';
}
function lastDay(y, m) { return new Date(y, m, 0).getDate(); }
function getMonth() { return parseInt(document.getElementById('sel-month').value); }
function getYear()  { return parseInt(document.getElementById('inp-year').value); }

// ── Calendar ────────────────────────────────────────────────────────────────────────
function renderCalendar() {
  const month = getMonth(), year = getYear();
  const ld = lastDay(year, month);
  if (invoiceDay > ld) invoiceDay = ld;

  document.getElementById('cal-title').textContent =
    'Jour de la facture — ' + MONTHS_CAP[month-1] + ' ' + year;

  const firstDow = (new Date(year, month-1, 1).getDay() + 6) % 7;
  const today = new Date();
  const tD = today.getDate(), tM = today.getMonth()+1, tY = today.getFullYear();

  const heads = ['L','M','M','J','V','S','D'].map(d =>
    `<div class="cal-head">${d}</div>`).join('');
  const blanks = Array(firstDow).fill('<div></div>').join('');
  const days = Array.from({length: ld}, (_,i) => {
    const d = i + 1;
    const cls = d === invoiceDay ? 'cal-day sel'
              : (d === tD && month === tM && year === tY) ? 'cal-day today'
              : 'cal-day';
    return `<div class="${cls}" onclick="selectDay(${d})">${d}</div>`;
  }).join('');

  document.getElementById('cal-grid').innerHTML = heads + blanks + days;
}

function selectDay(d) { invoiceDay = d; renderCalendar(); }

// ── Default description ──────────────────────────────────────────────────────
function defaultDesc(name) {
  return `Prestations de consultant dans le cadre du projet ${name}. Ces Prestations recouvrent notamment le périmètre suivant :
- Mise en valeur des sociétés européennes innovantes sur le service EuroQuity
- Support à l'animation de présentations en ligne ou en public relatifs à des projets européens et à d'autres opérations, de promotion et de communication du service EuroQuity et de son environnement
- Support à la coordination du projet et à l'animation des partenaires du service EuroQuity`;
}

// ── Row management ──────────────────────────────────────────────────────────────
function addRow() {
  const id = ++rowId;
  rowState[id] = { code: '', days: 5, descEdited: false };
  const idx  = Object.keys(rowState).length;
  const card = document.createElement('div');
  card.className = 'inv-card';
  card.id = `card-${id}`;
  card.innerHTML = `
    <div class="row-top">
      <div class="row-idx" id="idx-${id}">${idx}</div>
      <div class="ac-wrap">
        <label>Projet</label>
        <input class="ac-input" id="ac-${id}" type="text"
               placeholder="Tapez un nom ou un code..."
               autocomplete="off"
               oninput="acInput(${id},this.value)"
               onfocus="acOpen(${id})"
               onblur="setTimeout(()=>acClose(${id}),160)"
               onkeydown="acKey(${id},event)" />
        <div class="ac-drop" id="drop-${id}"></div>
      </div>
      <div class="field field-days">
        <label>Jours</label>
        <input type="number" id="days-${id}" value="5" min="1" max="31" step="1"
               oninput="setDays(${id},this.value)" />
      </div>
      <div class="row-total" id="total-${id}"></div>
      <button class="btn-remove" onclick="removeRow(${id})" title="Supprimer">&#x2715;</button>
    </div>
    <button class="desc-toggle" id="dtoggle-${id}" onclick="toggleDesc(${id})">
      <span id="dicon-${id}">›</span>
      <span id="dlabel-${id}">Modifier la description</span>
    </button>
    <div class="desc-box" id="dbox-${id}" hidden>
      <label>Description des prestations</label>
      <textarea id="dtxt-${id}"
                oninput="rowState[${id}].descEdited=true"
                placeholder="Sélectionnez un projet pour pré-remplir automatiquement."></textarea>
      <div class="desc-hint">Pré-remplie à la sélection du projet — modifiable librement.</div>
    </div>
  `;
  document.getElementById('rows-container').appendChild(card);
  refreshEmpty();
  refreshSummary();
  document.getElementById(`ac-${id}`).focus();
}

function removeRow(id) {
  delete rowState[id];
  document.getElementById(`card-${id}`).remove();
  let i = 1;
  document.querySelectorAll('.row-idx').forEach(el => el.textContent = i++);
  refreshEmpty();
  refreshSummary();
}

function refreshEmpty() {
  document.getElementById('empty-state').style.display =
    Object.keys(rowState).length === 0 ? 'block' : 'none';
}
function refreshSummary() {
  const p = getActiveProfile();
  const valid = Object.values(rowState).filter(r => r.code && r.days > 0);
  const sum   = valid.reduce((s,r) => s + r.days * p.tjm, 0);
  document.getElementById('summary').textContent = valid.length
    ? `${valid.length} facture${valid.length>1?'s':''} · ${fmtUI(sum)} HT`
    : '';
  // Update row totals
  Object.entries(rowState).forEach(([id, r]) => {
    const el = document.getElementById(`total-${id}`);
    if (el) el.textContent = (r.code && r.days > 0) ? fmtUI(r.days * p.tjm) : '';
  });
}
function setDays(id, val) {
  const d = parseInt(val) || 0;
  rowState[id].days = d;
  const p = getActiveProfile();
  document.getElementById(`total-${id}`).textContent =
    (rowState[id].code && d > 0) ? fmtUI(d * p.tjm) : '';
  refreshSummary();
}

// ── Description toggle ────────────────────────────────────────────────────────────
function toggleDesc(id) {
  const box  = document.getElementById(`dbox-${id}`);
  const open = box.hidden;
  box.hidden = !open;
  document.getElementById(`dicon-${id}`).textContent  = open ? '⌄' : '›';
  document.getElementById(`dlabel-${id}`).textContent = open ? 'Masquer' : 'Modifier la description';
}

// ── Autocomplete ─────────────────────────────────────────────────────────────────
const acHi = {};
function acMatches(q) {
  const l = q.trim().toLowerCase();
  if (!l) return Object.entries(PROJECTS).sort(([a],[b]) => a.localeCompare(b));
  return Object.entries(PROJECTS)
    .filter(([c,n]) => c.toLowerCase().includes(l) || n.toLowerCase().includes(l))
    .sort(([a],[b]) => {
      const ma = a.toLowerCase().startsWith(l), mb = b.toLowerCase().startsWith(l);
      return ma === mb ? a.localeCompare(b) : ma ? -1 : 1;
    }).slice(0, 10);
}
function renderDrop(id, q) {
  const drop = document.getElementById(`drop-${id}`);
  const list = acMatches(q);
  acHi[id] = -1;
  if (!list.length) { drop.innerHTML = '<div class="ac-empty">Aucun résultat</div>'; return; }
  drop.innerHTML = list.map(([code,name]) =>
    `<div class="ac-item" data-code="${code}" data-name="${name.replace(/"/g,'&quot;')}"
          onmousedown="pickProject(${id},'${code}','${name.replace(/'/g,"\\'")}')">
       <span class="ac-code">${code}</span><span class="ac-name">${name}</span>
     </div>`).join('');
}
function acInput(id,val) {
  rowState[id].code=''; document.getElementById(`ac-${id}`).classList.remove('selected');
  document.getElementById(`total-${id}`).textContent='';
  renderDrop(id,val); document.getElementById(`drop-${id}`).classList.add('open');
  refreshSummary();
}
function acOpen(id)  { renderDrop(id, document.getElementById(`ac-${id}`).value); document.getElementById(`drop-${id}`).classList.add('open'); }
function acClose(id) { document.getElementById(`drop-${id}`).classList.remove('open'); }
function acKey(id,e) {
  const items = document.getElementById(`drop-${id}`).querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key==='ArrowDown') { e.preventDefault(); acHi[id]=Math.min((acHi[id]??-1)+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('hi',i===acHi[id])); }
  else if (e.key==='ArrowUp') { e.preventDefault(); acHi[id]=Math.max((acHi[id]??0)-1,0); items.forEach((el,i)=>el.classList.toggle('hi',i===acHi[id])); }
  else if (e.key==='Enter'&&acHi[id]>=0) { e.preventDefault(); const it=items[acHi[id]]; pickProject(id,it.dataset.code,it.dataset.name); }
  else if (e.key==='Escape') acClose(id);
}
function pickProject(id,code,name) {
  rowState[id].code=code;
  const inp=document.getElementById(`ac-${id}`);
  inp.value=`${code} – ${name}`; inp.classList.add('selected');
  acClose(id);
  const p = getActiveProfile();
  const d=rowState[id].days;
  document.getElementById(`total-${id}`).textContent = d>0 ? fmtUI(d*p.tjm) : '';
  if (!rowState[id].descEdited) document.getElementById(`dtxt-${id}`).value = defaultDesc(name);
  refreshSummary();
}

// ── Toast ────────────────────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(_tt); _tt = setTimeout(() => el.className='', 3200);
}

// ── Preview ────────────────────────────────────────────────────────────────────────────
let previewDocs = [];
let previewIdx  = 0;

async function previewAll() {
  const valid = Object.entries(rowState)
    .map(([id,s]) => ({id:+id,...s}))
    .filter(r => r.code && r.days > 0);
  if (!valid.length) { showToast('Sélectionnez au moins un projet.','err'); return; }
  if (!getActiveProfile()) { showToast('Configurez votre profil d\'abord.','err'); return; }

  const month=getMonth(), year=getYear(), day=invoiceDay;
  const btn=document.getElementById('btn-preview');
  btn.disabled=true; btn.textContent='Chargement…';

  previewDocs = [];
  const prof  = getActiveProfile();
  const mm    = String(month).padStart(2,'0');

  for (const r of valid) {
    try {
      const desc = document.getElementById(`dtxt-${r.id}`).value.trim();
      const doc  = buildPDFDoc(r.code, PROJECTS[r.code], r.days, month, year, day, desc);
      previewDocs.push({
        doc,
        filename: `${prof.prenom} ${prof.nom} - ${r.code}-${mm}-${year}.pdf`,
        label: `${r.code} – ${PROJECTS[r.code]}`,
      });
    } catch(e) { showToast(`Erreur ${r.code}: ${e.message}`,'err'); }
  }

  btn.disabled=false; btn.textContent='Prévisualiser';
  if (!previewDocs.length) return;
  previewIdx = 0;
  document.getElementById('preview-modal').classList.add('open');
  renderPreviewFrame();
}

function renderPreviewFrame() {
  const {doc, label} = previewDocs[previewIdx];
  const total = previewDocs.length;
  document.getElementById('preview-title').textContent    = label;
  document.getElementById('preview-counter').textContent  = `${previewIdx+1} / ${total}`;
  document.getElementById('prev-btn').disabled = previewIdx === 0;
  document.getElementById('next-btn').disabled = previewIdx === total - 1;
  document.getElementById('btn-dl-all').style.display = total > 1 ? '' : 'none';
  document.getElementById('preview-iframe').src = doc.output('datauristring');
}

function previewNav(dir) {
  const next = previewIdx + dir;
  if (next < 0 || next >= previewDocs.length) return;
  previewIdx = next;
  renderPreviewFrame();
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
  document.getElementById('preview-iframe').src = 'about:blank';
}

function downloadCurrent() {
  const {doc, filename} = previewDocs[previewIdx];
  doc.save(filename);
  showToast('PDF téléchargé ✓');
}

async function downloadAll() {
  for (let i = 0; i < previewDocs.length; i++) {
    previewDocs[i].doc.save(previewDocs[i].filename);
    if (i < previewDocs.length - 1) await new Promise(r => setTimeout(r, 700));
  }
  showToast(`${previewDocs.length} PDF téléchargés ✓`);
}

document.getElementById('preview-modal').addEventListener('click', function(e) {
  if (e.target === this) closePreview();
});

// ── Build PDF ─────────────────────────────────────────────────────────────────────────
function buildPDFDoc(code, name, days, month, year, invoiceDay, descTxt) {
  const prof   = getActiveProfile();
  const { jsPDF } = window.jspdf;
  const doc    = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pW     = doc.internal.pageSize.getWidth();
  const margin = 22;
  const usable = pW - 2 * margin;

  const mName  = MONTHS_FR[month-1];
  const ld     = lastDay(year, month);
  const invNum = `${code}-${String(month).padStart(2,'0')}-${year}`;
  const totalHT  = days * prof.tjm;
  const tvaRate  = parseFloat(prof.tva) || 0;
  const totalTVA = Math.round(totalHT * tvaRate) / 100;
  const totalTTC = totalHT + totalTVA;
  const daysStr  = String(days);
  const description = descTxt || defaultDesc(name);

  const senderName = (prof.prenom + ' ' + prof.nom).toUpperCase();

  // Sender
  let y = 15;
  doc.setFontSize(9);
  doc.setFont('helvetica','bold');   doc.text(senderName, margin, y);
  doc.setFont('helvetica','normal');
  y+=5.5; doc.text(prof.adresse, margin, y);
  y+=5.5; doc.text(prof.ville,   margin, y);
  y+=9;   doc.text(`Tel : ${prof.tel}`, margin, y);
  y+=5.5; doc.text(`Email : ${prof.email}`, margin, y);
  y+=9;   doc.text(`N° SIRET : ${prof.siret}`, margin, y);

  // Recipient
  const rx = pW - margin;
  doc.text(RECIPIENT.name,  rx, 40,   {align:'right'});
  doc.text(RECIPIENT.line1, rx, 45.5, {align:'right'});
  doc.text(RECIPIENT.line2, rx, 51,   {align:'right'});

  // PAIEMENT
  y = 67;
  const pm = 'PAIEMENT A FIN DU MOIS';
  doc.setFont('helvetica','bold'); doc.setTextColor(180,0,0);
  doc.text(pm, margin, y);
  const pmW = doc.getTextWidth(pm);
  doc.setDrawColor(180,0,0); doc.setLineWidth(0.3);
  doc.line(margin, y+0.8, margin+pmW, y+0.8);

  // Date
  doc.setTextColor(0); doc.setFont('helvetica','normal');
  doc.text(`Le ${invoiceDay} ${mName} ${year}`, rx, y, {align:'right'});

  // Title
  y += 18;
  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text(`Facture n°${invNum}`, pW/2, y, {align:'center'});
  y += 6;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(`Période du 1er ${mName} ${year} au ${ld} ${mName} ${year}`, pW/2, y, {align:'center'});
  y += 9;

  // Table
  doc.autoTable({
    startY: y,
    margin: {left:margin, right:margin},
    head: [['Désignation des prestations','Quantité\n(en jours)','Prix HT\n(Hors Taxes)','Prix total HT\n(Hors Taxes)']],
    body: [[description, daysStr, fmtPDF(prof.tjm), fmtPDF(totalHT)]],
    columnStyles: {
      0: {cellWidth:usable*0.47, valign:'top'},
      1: {cellWidth:usable*0.17, halign:'center', valign:'top'},
      2: {cellWidth:usable*0.18, halign:'center', valign:'top'},
      3: {cellWidth:usable*0.18, halign:'center', valign:'top'},
    },
    headStyles: {fillColor:[245,246,250], textColor:[0,0,0], fontStyle:'bold', halign:'center', fontSize:8.5, lineColor:[0,0,0], lineWidth:0.3},
    bodyStyles: {minCellHeight:80, fontSize:9, lineColor:[0,0,0], lineWidth:0.3},
    styles: {cellPadding:5, overflow:'linebreak'},
  });

  y = doc.lastAutoTable.finalY;

  // ── Totals section (pleine largeur, pas de séparateur vertical) ────────────
  doc.setFontSize(9); doc.setLineWidth(0.3); doc.setDrawColor(0);

  if (tvaRate === 0) {
    // 1 ligne : PAIEMENT gauche | Total TTC droite
    const rH = 11;
    doc.rect(margin, y, usable, rH);
    doc.setFont('helvetica','bold'); doc.setTextColor(180,0,0);
    doc.text(pm, margin + 4, y + 7);
    const pmW2 = doc.getTextWidth(pm);
    doc.setDrawColor(180,0,0); doc.setLineWidth(0.25);
    doc.line(margin + 4, y + 7.7, margin + 4 + pmW2, y + 7.7);
    doc.setDrawColor(0); doc.setLineWidth(0.3);
    doc.setTextColor(0);
    doc.text('Total (en euros TTC)', rx - 32, y + 7, {align:'right'});
    doc.text(fmtPDF(totalHT), rx - 4, y + 7, {align:'right'});
    y += rH + 4;
    doc.setFont('helvetica','normal');
    doc.text('TVA Non applicable, art. 293 B du CGI', margin, y);
    y += 14;

  } else {
    // 3 lignes pleine largeur — pas de séparateur vertical
    const rowH  = 9;
    const totalH = rowH * 3;
    // Bordure extérieure + séparateurs horizontaux
    doc.rect(margin, y, usable, totalH);
    doc.line(margin, y + rowH,   margin + usable, y + rowH);
    doc.line(margin, y + rowH*2, margin + usable, y + rowH*2);
    doc.setTextColor(0); doc.setFont('helvetica','normal');
    // Ligne 1 : Total HT — libellé | montant séparés
    doc.text('Total HT', rx - 32, y + rowH/2 + 1.5, {align:'right'});
    doc.text(fmtPDF(totalHT), rx - 4, y + rowH/2 + 1.5, {align:'right'});
    // Ligne 2 : TVA — libellé | montant séparés
    doc.text(`TVA ${tvaRate}%`, rx - 32, y + rowH + rowH/2 + 1.5, {align:'right'});
    doc.text(fmtPDF(totalTVA), rx - 4, y + rowH + rowH/2 + 1.5, {align:'right'});
    // Ligne 3 : PAIEMENT gauche + Total TTC droite (gras)
    doc.setFont('helvetica','bold'); doc.setTextColor(180,0,0);
    doc.text(pm, margin + 4, y + rowH*2 + rowH/2 + 1.5);
    const pmW2 = doc.getTextWidth(pm);
    doc.setDrawColor(180,0,0); doc.setLineWidth(0.25);
    doc.line(margin + 4, y + rowH*2 + rowH/2 + 2.2, margin + 4 + pmW2, y + rowH*2 + rowH/2 + 2.2);
    doc.setDrawColor(0); doc.setLineWidth(0.3);
    doc.setTextColor(0);
    doc.text('Total TTC', rx - 32, y + rowH*2 + rowH/2 + 1.5, {align:'right'});
    doc.text(fmtPDF(totalTTC), rx - 4, y + rowH*2 + rowH/2 + 1.5, {align:'right'});
    y += totalH + 14;
  }

  // IBAN / BIC
  if (prof.iban) {
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    const ibanW = doc.getTextWidth(prof.iban);
    const valX  = pW - margin - ibanW;
    const gap   = 3;
    doc.setFont('helvetica','bold');
    doc.text('IBAN :', valX-gap, y, {align:'right'});
    doc.setFont('helvetica','normal'); doc.text(prof.iban, valX, y);
    y += 5.5;
    if (prof.bic) {
      doc.setFont('helvetica','bold');
      doc.text('BIC :', valX-gap, y, {align:'right'});
      doc.setFont('helvetica','normal'); doc.text(prof.bic, valX, y);
      y += 16;
    }
  }

  // Signature + nom
  if (prof.signature) {
    try {
      const sigW = 50, sigH = 25;
      const sigX = pW - margin - sigW;
      doc.addImage(prof.signature, sigX, y, sigW, sigH);
      y += sigH + 4;
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0);
      doc.text(prof.prenom + ' ' + prof.nom, sigX + sigW / 2, y, {align:'center'});
    } catch(e) {}
  }

  return doc;
}
</script>

<script>
// ── Animated bubble background ───────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('bubble-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;
  let bubbles  = [];
  const COUNT  = 22;

  // Palette de bleus : [r, g, b]
  const BLUES = [
    [26,  58, 107],   // bleu nuit profond
    [37,  99, 235],   // bleu royal
    [29, 143, 206],   // bleu azur
    [14, 116, 189],   // bleu cobalt
    [55,  48, 163],   // indigo
    [71, 156, 219],   // bleu ciel
    [96, 165, 250],   // bleu lavande
  ];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkBubble(randomY) {
    const r    = 16 + Math.random() * 72;
    const col  = BLUES[Math.floor(Math.random() * BLUES.length)];
    return {
      x:      Math.random() * W,
      y:      randomY ? Math.random() * H : H + r + Math.random() * 200,
      r,
      col,
      speed:  0.2 + Math.random() * 0.5,
      alpha:  0.04 + Math.random() * 0.08,
      wobble: Math.random() * Math.PI * 2,
      wSpeed: 0.003 + Math.random() * 0.009,
    };
  }

  function init() {
    resize();
    bubbles = Array.from({ length: COUNT }, () => mkBubble(true));
    window.addEventListener('resize', resize);
    requestAnimationFrame(tick);
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < bubbles.length; i++) {
      const b = bubbles[i];
      b.y      -= b.speed;
      b.wobble += b.wSpeed;
      const x   = b.x + Math.sin(b.wobble) * 26;
      const [cr, cg, cb] = b.col;
      ctx.beginPath();
      ctx.arc(x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle   = `rgba(${cr},${cg},${cb},${b.alpha})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${b.alpha * 2.2})`;
      ctx.lineWidth   = 1.2;
      ctx.stroke();
      if (b.y < -b.r * 2) bubbles[i] = mkBubble(false);
    }
    requestAnimationFrame(tick);
  }

  init();
})();
</script>
