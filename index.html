<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factures Bpifrance</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080b14;
      --surface:      #0f1623;
      --surface2:     #161f30;
      --border:       rgba(255,255,255,.09);
      --text:         #ffffff;
      --muted:        #6b7280;
      --accent:       #3b82f6;
      --accent-dim:   rgba(59,130,246,.15);
      --success:      #10b981;
      --danger:       #f87171;
      --dbg:          rgba(248,113,113,.10);
      --radius:       12px;
      --shadow:       0 1px 2px rgba(0,0,0,.5), 0 8px 32px rgba(0,0,0,.4);
      --input-bg:     #ffffff;
      --input-text:   #0f172a;
      --input-border: #e2e8f0;
      --input-focus:  #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse 100% 60% at 50% -5%, rgba(30,58,138,.5) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% 80%, rgba(16,185,129,.05) 0%, transparent 50%);
    }

    /* ── Top bar ──────────────────────────────────────────── */
    .top-bar {
      background: rgba(10,10,10,.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -.2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar-title::before {
      content: "";
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(59,130,246,.4);
    }
    .top-bar-sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      max-width: 800px;
      margin: 36px auto;
      padding: 0 24px 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
      position: relative;
      overflow: hidden;
    }
    .section::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(59,130,246,.6) 20%,
        rgba(99,152,255,.9) 50%,
        rgba(59,130,246,.6) 80%,
        transparent 100%);
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #4b5563;
      margin-bottom: 22px;
    }

    /* ── Profile card ─────────────────────────────────────── */
    .profile-layout {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .profile-name {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -.3px;
    }
    .profile-detail {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .profile-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .profile-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.25);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #60a5fa;
      font-weight: 600;
      letter-spacing: .1px;
    }
    .profile-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Period ──────────────────────────────────────────── */
    .period-top { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; margin-bottom: 22px; justify-content: center; }
    .cal-header { text-align: center; }
    .cal-grid   { margin: 0 auto; }
    .field      { display: flex; flex-direction: column; gap: 8px; }
    .field label{ font-size: 12px; font-weight: 600; color: #f1f5f9; letter-spacing: .1px; }

    select, input[type="number"], input[type="text"], input[type="email"], textarea {
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      padding: 12px 14px;
      font: inherit;
      font-size: 14px;
      color: var(--input-text);
      background: var(--input-bg);
      outline: none;
      min-height: 48px;
      transition: border-color .18s, box-shadow .18s;
    }
    select option { background: #ffffff; color: #0f172a; }
    select:focus, input[type="number"]:focus, input[type="text"]:focus,
    input[type="email"]:focus, textarea:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(59,130,246,.22);
    }

    /* ── Calendar ────────────────────────────────────────── */
    .cal-header {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .7px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      max-width: 308px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px;
      padding: 14px 12px;
    }
    .cal-head {
      text-align: center;
      font-size: 9.5px;
      font-weight: 700;
      color: #475569;
      padding: 0 0 8px;
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .cal-day {
      text-align: center;
      padding: 7px 2px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: #cbd5e1;
      transition: background .12s, color .12s;
      user-select: none;
      font-weight: 400;
    }
    .cal-day:hover  { background: rgba(59,130,246,.18); color: #93c5fd; }
    .cal-day.today  { color: #60a5fa; font-weight: 700; background: rgba(59,130,246,.08); }
    .cal-day.sel    { background: var(--accent); color: #fff; font-weight: 700; box-shadow: 0 2px 10px rgba(59,130,246,.55); }

    /* ── Invoice rows ─────────────────────────────────────── */
    #rows-container { display: flex; flex-direction: column; gap: 12px; }

    .inv-card {
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      padding: 18px 20px;
      background: var(--surface2);
      transition: border-color .18s, box-shadow .18s;
    }
    .inv-card:focus-within { border-color: rgba(59,130,246,.4); box-shadow: 0 0 0 2px rgba(59,130,246,.1); }

    .row-top { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }

    .row-idx {
      width: 22px; height: 22px;
      border: 1px solid var(--border);
      border-radius: 50%;
      font-size: 11px; font-weight: 600; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; align-self: center;
    }

    /* ── Autocomplete ─────────────────────────────────────── */
    .ac-wrap { position: relative; flex: 1 1 260px; }
    .ac-wrap label { font-size: 12px; font-weight: 600; color: #f1f5f9; display: block; margin-bottom: 8px; }

    .ac-input {
      width: 100%;
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      padding: 12px 14px;
      font: inherit; font-size: 14px;
      color: var(--input-text);
      background: var(--input-bg);
      outline: none;
      min-height: 48px;
      transition: border-color .18s, box-shadow .18s;
    }
    .ac-input:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(59,130,246,.22); }
    .ac-input.selected { font-weight: 500; }

    .ac-drop {
      display: none;
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      background: #1a2235;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
      z-index: 200;
      max-height: 250px;
      overflow-y: auto;
    }
    .ac-drop.open { display: block; }
    .ac-item {
      padding: 10px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.hi { background: rgba(59,130,246,.12); }
    .ac-code { font-family: monospace; font-size: 11px; font-weight: 700; color: #60a5fa; min-width: 52px; }
    .ac-name { font-size: 13px; color: #e5e7eb; }
    .ac-empty { padding: 14px; text-align: center; color: var(--muted); font-size: 13px; }

    .field-days { width: 80px; }
    .field-days input { width: 100%; }

    .row-total { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; padding-bottom: 1px; min-width: 70px; text-align: right; }

    .btn-remove {
      background: none; border: none; cursor: pointer; color: #4b5563;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s; flex-shrink: 0;
    }
    .btn-remove:hover { color: #f87171; background: rgba(248,113,113,.1); }

    .desc-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 9px; background: none; border: none; cursor: pointer;
      font: inherit; font-size: 12px; color: var(--muted); padding: 0;
      transition: color .15s;
    }
    .desc-toggle:hover { color: var(--accent); }

    .desc-box { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.06); }
    .desc-box label { font-size: 12px; font-weight: 600; color: #f1f5f9; display: block; margin-bottom: 8px; }
    .desc-box textarea {
      width: 100%; border: 1.5px solid var(--input-border); border-radius: 8px;
      padding: 12px 14px; font: inherit; font-size: 13.5px; color: var(--input-text);
      resize: vertical; min-height: 120px; outline: none; line-height: 1.7;
      transition: border-color .18s, box-shadow .18s;
      background: var(--input-bg);
    }
    .desc-box textarea:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(59,130,246,.22); }
    .desc-hint { font-size: 11.5px; color: #475569; margin-top: 6px; }


    /* ── Empty state ──────────────────────────────────────── */
    #empty-state { text-align: center; padding: 32px; color: #4b5563; font-size: 13px; }

    /* ── Bottom bar ───────────────────────────────────────── */
    .bottom-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .bottom-left { display: flex; align-items: center; gap: 14px; }
    #summary { font-size: 12.5px; color: var(--muted); }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn { border-radius: 8px; cursor: pointer; font: inherit; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent; transition: all .18s ease; }
    .btn-outline { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.14); color: #e2e8f0; padding: 9px 16px; font-size: 13.5px; }
    .btn-outline:hover { border-color: rgba(59,130,246,.5); color: #93c5fd; background: rgba(59,130,246,.1); }
    .btn-sm { padding: 7px 13px; font-size: 12.5px; }
    .btn-ghost { background: none; border: none; cursor: pointer; font: inherit; font-size: 12px; color: var(--muted); padding: 0; transition: color .15s; }
    .btn-ghost:hover { color: var(--danger); }
    .btn-gen {
      background: var(--accent);
      color: #ffffff;
      padding: 13px 32px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(59,130,246,.5), 0 1px 0 rgba(255,255,255,.1) inset;
      letter-spacing: -.1px;
    }
    .btn-gen:hover {
      background: var(--success);
      box-shadow: 0 8px 28px rgba(16,185,129,.55), 0 1px 0 rgba(255,255,255,.1) inset;
      transform: translateY(-2px);
    }
    .btn-gen:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(16,185,129,.4); }
    .btn-gen:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-danger { background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.3); color: #fca5a5; padding: 9px 16px; font-size: 13.5px; }
    .btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ── Profile selector (small) ─────────────────────────── */
    select#profile-select {
      font-size: 12.5px;
      padding: 6px 10px;
      max-width: 210px;
      color: var(--input-text);
    }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #0f1623;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      box-shadow: 0 40px 120px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.04);
      padding: 32px 32px 28px;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-box::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,.7) 30%, rgba(99,152,255,1) 50%, rgba(59,130,246,.7) 70%, transparent);
      border-radius: 16px 16px 0 0;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 26px;
      letter-spacing: -.3px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-field label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: .2px;
    }
    .form-field input, .form-field select {
      width: 100%;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .modal-close-btn {
      position: absolute;
      top: 20px; right: 20px;
      background: none; border: none; cursor: pointer;
      color: #4b5563; font-size: 20px;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      line-height: 1;
    }
    .modal-close-btn:hover { color: #e2e8f0; background: rgba(255,255,255,.08); }

    /* ── Toast ────────────────────────────────────────────── */
    #toast { position: fixed; bottom: 24px; right: 24px; background: #1f2937; color: #f9fafb; border-radius: 10px; padding: 12px 18px; font-size: 13.5px; font-weight: 500; max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.08); opacity: 0; transform: translateY(10px); transition: all .22s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { border-left: 3px solid #10b981; }
    #toast.err { border-left: 3px solid var(--danger); }

    .tva-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      opacity: .7;
    }

    /* ── Row number badge ─────────────────────────────────── */
    .row-idx {
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.2);
      color: #60a5fa;
      font-size: 11.5px;
    }

    /* ── Row top alignment ────────────────────────────────── */
    .row-top { gap: 12px; }
    .field-days input { min-height: 48px; }

    /* ── Desc toggle ──────────────────────────────────────── */
    .desc-toggle { color: #4b5563; font-size: 12.5px; margin-top: 12px; }
    .desc-toggle:hover { color: #60a5fa; }

    /* ── Row total ────────────────────────────────────────── */
    .row-total { color: #34d399; font-size: 14px; font-weight: 700; }

    /* ── Summary ──────────────────────────────────────────── */
    #summary { color: #6b7280; font-size: 13.5px; }

    /* ── Bottom bar ───────────────────────────────────────── */
    .bottom-bar { padding: 6px 0; gap: 16px; }

    /* ── Empty state ──────────────────────────────────────── */
    #empty-state { padding: 40px; color: #374151; font-size: 13.5px; }

    /* ── Tva note ─────────────────────────────────────────── */
    .tva-note { color: #475569; font-size: 11.5px; margin-top: 5px; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast { font-size: 14px; }

    @media (max-width: 600px) {
      .top-bar { padding: 12px 16px; }
      main { margin: 20px auto; padding: 0 14px 70px; gap: 16px; }
      .section { padding: 20px 18px; }
      .bottom-bar { flex-direction: column; align-items: stretch; }
      .btn-gen { justify-content: center; }
      .form-grid { grid-template-columns: 1fr; }
      .modal-box { padding: 24px 20px 20px; margin: 12px; }
      .profile-layout { gap: 16px; }
    }
  </style>
</head>
<body>

<!-- Top bar (replaces header) -->
<div class="top-bar">
  <div class="top-bar-title">Générateur de Factures</div>
  <div class="top-bar-sub">Bpifrance</div>
</div>

<main>

  <!-- Encart profil -->
  <div class="section">
    <div class="section-title">Profil actif</div>
    <div class="profile-layout">
      <div class="profile-info">
        <div class="profile-name" id="prof-name"></div>
        <div class="profile-detail" id="prof-contact"></div>
        <div class="profile-detail" id="prof-siret"></div>
        <div class="profile-badges">
          <div class="profile-badge" id="prof-tjm"></div>
          <div class="profile-badge" id="prof-tva"></div>
        </div>
      </div>
      <div class="profile-controls">
        <select id="profile-select" onchange="switchProfile(parseInt(this.value))"></select>
        <button class="btn btn-outline btn-sm" onclick="openProfileModal(activeProfileIdx)" title="Modifier ce profil">Modifier</button>
        <button class="btn btn-outline btn-sm" onclick="openProfileModal(-1)" title="Ajouter un nouveau profil">+ Profil</button>
      </div>
    </div>
  </div>

  <!-- Période -->
  <div class="section">
    <div class="section-title">Période de facturation</div>
    <div class="period-top">
      <div class="field">
        <label for="sel-month">Mois</label>
        <select id="sel-month" style="width:160px" onchange="renderCalendar()">
          <option value="1">01 – Janvier</option>
          <option value="2">02 – Février</option>
          <option value="3">03 – Mars</option>
          <option value="4">04 – Avril</option>
          <option value="5">05 – Mai</option>
          <option value="6">06 – Juin</option>
          <option value="7">07 – Juillet</option>
          <option value="8">08 – Août</option>
          <option value="9">09 – Septembre</option>
          <option value="10">10 – Octobre</option>
          <option value="11">11 – Novembre</option>
          <option value="12">12 – Décembre</option>
        </select>
      </div>
      <div class="field">
        <label for="inp-year">Année</label>
        <input type="number" id="inp-year" min="2020" max="2040" style="width:80px" oninput="renderCalendar()" />
      </div>
    </div>
    <div class="cal-header" id="cal-title"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>


  <!-- Factures -->
  <div class="section">
    <div class="section-title">Factures à générer</div>
    <div id="rows-container"></div>
    <div id="empty-state">Aucune facture — cliquez sur « Ajouter » pour commencer.</div>
  </div>

  <!-- Actions -->
  <div class="bottom-bar">
    <div class="bottom-left">
      <button class="btn btn-outline" onclick="addRow()">+ Ajouter une facture</button>
      <span id="summary"></span>
    </div>
    <button class="btn btn-gen" id="btn-gen" onclick="generateAll()">Générer les PDF</button>
  </div>

</main>

<!-- Modal profil -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeProfileModal()">×</button>
    <div class="modal-title" id="modal-title">Nouveau profil</div>
    <div class="form-grid">
      <div class="form-field">
        <label>Prénom</label>
        <input type="text" id="f-prenom" placeholder="Pierre-Alexis" />
      </div>
      <div class="form-field">
        <label>Nom</label>
        <input type="text" id="f-nom" placeholder="Fillon" />
      </div>

function loadProfiles() {

let profiles = loadProfiles();

if (activeProfileIdx < 0) activeProfileIdx = 0;

function getActiveProfile() { return profiles[activeProfileIdx] || profiles[0]; }

function renderProfileCard() {

function openProfileModal(idx) {

  const isNew = idx === -1;

  const p = isNew ? {} : profiles[idx];

  document.getElementById('f-bic').value    = p.bic    || '';

  document.getElementById('f-tva').value    = p.tva    || '0';

  // Delete button (only for existing non-last profiles)
  const wrap = document.getElementById('modal-delete-wrap');

  } else {
    wrap.innerHTML = '';

  document.getElementById('profile-modal').classList.add('open');

function saveProfile() {

  const nom    = document.getElementById('f-nom').value.trim();

    id: editingProfileIdx === -1 ? Date.now() : profiles[editingProfileIdx].id,
    prenom,
    nom,
    adresse: document.getElementById('f-adresse').value.trim(),
    ville:   document.getElementById('f-ville').value.trim(),

    profiles.push(p);
    activeProfileIdx = profiles.length - 1;
  } else {

  saveProfiles();

  renderProfileCard();

function deleteProfile(idx) {
  if (profiles.length <= 1) { showToast('Impossible de supprimer le dernier profil.', 'err'); return; }
  profiles.splice(idx, 1);
  if (activeProfileIdx >= profiles.length) activeProfileIdx = profiles.length - 1;
  saveProfiles();
  localStorage.setItem('activeProfileIdx', activeProfileIdx);
  renderProfileSelect();
  renderProfileCard();
  closeProfileModal();
  showToast('Profil supprimé.');
}

// ── State ───────────────────────────────────────────────────────────────────────
let rowId      = 0;
const rowState = {};
let invoiceDay = new Date().getDate();

// ── Init ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {

// ── Formatters ────────────────────────────────────────────────────────────────
function fmtUI(v)  { return v.toLocaleString('fr-FR') + ' €'; }
function fmtPDF(v) {
  const s = Math.round(v);
  return (s >= 1000
    ? Math.floor(s/1000) + ' ' + String(s%1000).padStart(3,'0')
    : String(s)) + ' €';
}
function lastDay(y, m) { return new Date(y, m, 0).getDate(); }
function getMonth() { return parseInt(document.getElementById('sel-month').value); }
function getYear()  { return parseInt(document.getElementById('inp-year').value); }

// ── Calendar ────────────────────────────────────────────────────────────────────────
function renderCalendar() {
  const month = getMonth(), year = getYear();
  const ld = lastDay(year, month);
  if (invoiceDay > ld) invoiceDay = ld;

  document.getElementById('cal-title').textContent =
    'Jour de la facture — ' + MONTHS_CAP[month-1] + ' ' + year;

  const firstDow = (new Date(year, month-1, 1).getDay() + 6) % 7;
  const today = new Date();
  const tD = today.getDate(), tM = today.getMonth()+1, tY = today.getFullYear();

  const heads = ['L','M','M','J','V','S','D'].map(d =>
    `<div class="cal-head">${d}</div>`).join('');
  const blanks = Array(firstDow).fill('<div></div>').join('');
  const days = Array.from({length: ld}, (_,i) => {
    const d = i + 1;
    const cls = d === invoiceDay ? 'cal-day sel'
              : (d === tD && month === tM && year === tY) ? 'cal-day today'
              : 'cal-day';
    return `<div class="${cls}" onclick="selectDay(${d})">${d}</div>`;
  }).join('');

  document.getElementById('cal-grid').innerHTML = heads + blanks + days;
}

function selectDay(d) { invoiceDay = d; renderCalendar(); }

// ── Default description ──────────────────────────────────────────────────────
function defaultDesc(name) {
  return `Prestations de consultant dans le cadre du projet ${name}. Ces Prestations recouvrent notamment le périmètre suivant :
- Mise en valeur des sociétés européennes innovantes sur le service EuroQuity
- Support à l'animation de présentations en ligne ou en public relatifs à des projets européens et à d'autres opérations, de promotion et de communication du service EuroQuity et de son environnement
- Support à la coordination du projet et à l'animation des partenaires du service EuroQuity`;
}

// ── Row management ──────────────────────────────────────────────────────────────
function addRow() {
  const id = ++rowId;
  rowState[id] = { code: '', days: 5, descEdited: false };
  const idx  = Object.keys(rowState).length;
  const card = document.createElement('div');
  card.className = 'inv-card';
  card.id = `card-${id}`;
  card.innerHTML = `
    <div class="row-top">
      <div class="row-idx" id="idx-${id}">${idx}</div>
      <div class="ac-wrap">
        <label>Projet</label>
        <input class="ac-input" id="ac-${id}" type="text"
               placeholder="Tapez un nom ou un code..."
               autocomplete="off"
               oninput="acInput(${id},this.value)"
               onfocus="acOpen(${id})"
               onblur="setTimeout(()=>acClose(${id}),160)"
               onkeydown="acKey(${id},event)" />
        <div class="ac-drop" id="drop-${id}"></div>
      </div>
      <div class="field field-days">
        <label>Jours</label>
        <input type="number" id="days-${id}" value="5" min="1" max="31" step="1"
               oninput="setDays(${id},this.value)" />
      </div>
      <div class="row-total" id="total-${id}"></div>
      <button class="btn-remove" onclick="removeRow(${id})" title="Supprimer">&#x2715;</button>
    </div>
    <button class="desc-toggle" id="dtoggle-${id}" onclick="toggleDesc(${id})">
      <span id="dicon-${id}">›</span>
      <span id="dlabel-${id}">Modifier la description</span>
    </button>
    <div class="desc-box" id="dbox-${id}" hidden>
      <label>Description des prestations</label>
      <textarea id="dtxt-${id}"
                oninput="rowState[${id}].descEdited=true"
                placeholder="Sélectionnez un projet pour pré-remplir automatiquement."></textarea>
      <div class="desc-hint">Pré-remplie à la sélection du projet — modifiable librement.</div>
    </div>
  `;
  document.getElementById('rows-container').appendChild(card);
  refreshEmpty();
  refreshSummary();
  document.getElementById(`ac-${id}`).focus();
}

function removeRow(id) {
  delete rowState[id];
  document.getElementById(`card-${id}`).remove();
  let i = 1;
  document.querySelectorAll('.row-idx').forEach(el => el.textContent = i++);
  refreshEmpty();
  refreshSummary();
}

function refreshEmpty() {
  document.getElementById('empty-state').style.display =
    Object.keys(rowState).length === 0 ? 'block' : 'none';
}
function refreshSummary() {
  const p = getActiveProfile();
  const valid = Object.values(rowState).filter(r => r.code && r.days > 0);
  const sum   = valid.reduce((s,r) => s + r.days * p.tjm, 0);
  document.getElementById('summary').textContent = valid.length
    ? `${valid.length} facture${valid.length>1?'s':''} · ${fmtUI(sum)} HT`
    : '';
  // Update row totals
  Object.entries(rowState).forEach(([id, r]) => {
    const el = document.getElementById(`total-${id}`);
    if (el) el.textContent = (r.code && r.days > 0) ? fmtUI(r.days * p.tjm) : '';
  });
}
function setDays(id, val) {
  const d = parseInt(val) || 0;
  rowState[id].days = d;
  const p = getActiveProfile();
  document.getElementById(`total-${id}`).textContent =
    (rowState[id].code && d > 0) ? fmtUI(d * p.tjm) : '';
  refreshSummary();
}

// ── Description toggle ────────────────────────────────────────────────────────────
function toggleDesc(id) {
  const box  = document.getElementById(`dbox-${id}`);
  const open = box.hidden;
  box.hidden = !open;
  document.getElementById(`dicon-${id}`).textContent  = open ? '⌄' : '›';
  document.getElementById(`dlabel-${id}`).textContent = open ? 'Masquer' : 'Modifier la description';
}

// ── Autocomplete ─────────────────────────────────────────────────────────────────
const acHi = {};
function acMatches(q) {
  const l = q.trim().toLowerCase();
  if (!l) return Object.entries(PROJECTS).sort(([a],[b]) => a.localeCompare(b));
  return Object.entries(PROJECTS)
    .filter(([c,n]) => c.toLowerCase().includes(l) || n.toLowerCase().includes(l))
    .sort(([a],[b]) => {
      const ma = a.toLowerCase().startsWith(l), mb = b.toLowerCase().startsWith(l);
      return ma === mb ? a.localeCompare(b) : ma ? -1 : 1;
    }).slice(0, 10);
}
function renderDrop(id, q) {
  const drop = document.getElementById(`drop-${id}`);
  const list = acMatches(q);
  acHi[id] = -1;
  if (!list.length) { drop.innerHTML = '<div class="ac-empty">Aucun résultat</div>'; return; }
  drop.innerHTML = list.map(([code,name]) =>
    `<div class="ac-item" data-code="${code}" data-name="${name.replace(/"/g,'&quot;')}"
          onmousedown="pickProject(${id},'${code}','${name.replace(/'/g,"\\'")}')">
       <span class="ac-code">${code}</span><span class="ac-name">${name}</span>
     </div>`).join('');
}
function acInput(id,val) {
  rowState[id].code=''; document.getElementById(`ac-${id}`).classList.remove('selected');
  document.getElementById(`total-${id}`).textContent='';
  renderDrop(id,val); document.getElementById(`drop-${id}`).classList.add('open');
  refreshSummary();
}
function acOpen(id)  { renderDrop(id, document.getElementById(`ac-${id}`).value); document.getElementById(`drop-${id}`).classList.add('open'); }
function acClose(id) { document.getElementById(`drop-${id}`).classList.remove('open'); }
function acKey(id,e) {
  const items = document.getElementById(`drop-${id}`).querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key==='ArrowDown') { e.preventDefault(); acHi[id]=Math.min((acHi[id]??-1)+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('hi',i===acHi[id])); }
  else if (e.key==='ArrowUp') { e.preventDefault(); acHi[id]=Math.max((acHi[id]??0)-1,0); items.forEach((el,i)=>el.classList.toggle('hi',i===acHi[id])); }
  else if (e.key==='Enter'&&acHi[id]>=0) { e.preventDefault(); const it=items[acHi[id]]; pickProject(id,it.dataset.code,it.dataset.name); }
  else if (e.key==='Escape') acClose(id);
}
function pickProject(id,code,name) {
  rowState[id].code=code;
  const inp=document.getElementById(`ac-${id}`);
  inp.value=`${code} – ${name}`; inp.classList.add('selected');
  acClose(id);
  const p = getActiveProfile();
  const d=rowState[id].days;
  document.getElementById(`total-${id}`).textContent = d>0 ? fmtUI(d*p.tjm) : '';
  if (!rowState[id].descEdited) document.getElementById(`dtxt-${id}`).value = defaultDesc(name);
  refreshSummary();
}

// ── Toast ────────────────────────────────────────────────────────────────────────────────
let _tt;
function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(_tt); _tt = setTimeout(() => el.className='', 3200);
}

// ── Generate ──────────────────────────────────────────────────────────────────────────
async function generateAll() {
  const valid = Object.entries(rowState)
    .map(([id,s]) => ({id:+id,...s}))
    .filter(r => r.code && r.days > 0);
  if (!valid.length) { showToast('Sélectionnez au moins un projet.','err'); return; }

  const month=getMonth(), year=getYear(), day=invoiceDay;
  const btn=document.getElementById('btn-gen');
  btn.disabled=true; btn.textContent='Génération…';

  let count=0;
  for (const r of valid) {
    try {
      const desc = document.getElementById(`dtxt-${r.id}`).value.trim();
      buildPDF(r.code, PROJECTS[r.code], r.days, month, year, day, desc);
      count++;
      await new Promise(res => setTimeout(res,700));
    } catch(e) { showToast(`Erreur ${r.code}: ${e.message}`,'err'); }
  }
  btn.disabled=false; btn.textContent='Générer les PDF';
  if (count) showToast(`${count} PDF téléchargé${count>1?'s':''} ✓`);
}

// ── Build PDF ─────────────────────────────────────────────────────────────────────────
function buildPDF(code, name, days, month, year, invoiceDay, descTxt) {
  const prof   = getActiveProfile();
  const { jsPDF } = window.jspdf;
  const doc    = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pW     = doc.internal.pageSize.getWidth();
  const margin = 22;
  const usable = pW - 2 * margin;

  const mName  = MONTHS_FR[month-1];
  const ld     = lastDay(year, month);
  const invNum = `${code}-${String(month).padStart(2,'0')}-${year}`;
  const totalHT  = days * prof.tjm;
  const tvaRate  = parseFloat(prof.tva) || 0;
  const totalTVA = Math.round(totalHT * tvaRate) / 100;
  const totalTTC = totalHT + totalTVA;
  const daysStr  = String(days);
  const description = descTxt || defaultDesc(name);

  const senderName = (prof.prenom + ' ' + prof.nom).toUpperCase();

  // Sender
  let y = 15;
  doc.setFontSize(9);
  doc.setFont('helvetica','bold');   doc.text(senderName, margin, y);
  doc.setFont('helvetica','normal');
  y+=5.5; doc.text(prof.adresse, margin, y);
  y+=5.5; doc.text(prof.ville,   margin, y);
  y+=9;   doc.text(`Tel : ${prof.tel}`, margin, y);
  y+=5.5; doc.text(`Email : ${prof.email}`, margin, y);
  y+=9;   doc.text(`N° SIRET : ${prof.siret}`, margin, y);

  // Recipient
  const rx = pW - margin;
  doc.text(RECIPIENT.name,  rx, 40,   {align:'right'});
  doc.text(RECIPIENT.line1, rx, 45.5, {align:'right'});
  doc.text(RECIPIENT.line2, rx, 51,   {align:'right'});

  // PAIEMENT
  y = 67;
  const pm = 'PAIEMENT A FIN DU MOIS';
  doc.setFont('helvetica','bold'); doc.setTextColor(180,0,0);
  doc.text(pm, margin, y);
  const pmW = doc.getTextWidth(pm);
  doc.setDrawColor(180,0,0); doc.setLineWidth(0.3);
  doc.line(margin, y+0.8, margin+pmW, y+0.8);

  // Date
  doc.setTextColor(0); doc.setFont('helvetica','normal');
  doc.text(`Le ${invoiceDay} ${mName} ${year}`, rx, y, {align:'right'});

  // Title
  y += 18;
  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text(`Facture n°${invNum}`, pW/2, y, {align:'center'});
  y += 6;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(`Période du 1er ${mName} ${year} au ${ld} ${mName} ${year}`, pW/2, y, {align:'center'});
  y += 9;

  // Table
  doc.autoTable({
    startY: y,
    margin: {left:margin, right:margin},
    head: [['Désignation des prestations','Quantité\n(en jours)','Prix HT\n(Hors Taxes)','Prix total HT\n(Hors Taxes)']],
    body: [[description, daysStr, fmtPDF(prof.tjm), fmtPDF(totalHT)]],
    columnStyles: {
      0: {cellWidth:usable*0.47, valign:'top'},
      1: {cellWidth:usable*0.17, halign:'center', valign:'top'},
      2: {cellWidth:usable*0.18, halign:'center', valign:'top'},
      3: {cellWidth:usable*0.18, halign:'center', valign:'top'},
    },
    headStyles: {fillColor:[245,246,250], textColor:[0,0,0], fontStyle:'bold', halign:'center', fontSize:8.5, lineColor:[0,0,0], lineWidth:0.3},
    bodyStyles: {minCellHeight:80, fontSize:9, lineColor:[0,0,0], lineWidth:0.3},
    styles: {cellPadding:5, overflow:'linebreak'},
  });

  y = doc.lastAutoTable.finalY;

  // Total row
  const rH = 11, sepX = margin + usable*0.47;
  doc.setDrawColor(0); doc.setLineWidth(0.3);
  doc.rect(margin, y, usable, rH);
  doc.line(sepX, y, sepX, y+rH);

  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(180,0,0);
  doc.text(pm, margin+4, y+7);
  const pmW2 = doc.getTextWidth(pm);
  doc.setDrawColor(180,0,0); doc.setLineWidth(0.25);
  doc.line(margin+4, y+7.7, margin+4+pmW2, y+7.7);

  doc.setTextColor(0); doc.setDrawColor(0); doc.setFont('helvetica','bold');
  doc.text(`Total (en euros HT)     ${fmtPDF(totalHT)}`, rx-4, y+7, {align:'right'});
  y += rH+4;

  // TVA
  doc.setFont('helvetica','normal');
  if (tvaRate === 0) {
    doc.text('TVA Non applicable, art. 293 B du CGI', margin, y);
  } else {
    doc.text(`TVA ${tvaRate}%     ${fmtPDF(totalTVA)}`, margin, y);
    y += 6;
    doc.setFont('helvetica','bold');
    doc.text(`Total TTC     ${fmtPDF(totalTTC)}`, margin, y);
    doc.setFont('helvetica','normal');
  }
  y += 14;

  // IBAN / BIC
  if (prof.iban) {
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    const ibanW = doc.getTextWidth(prof.iban);
    const valX  = pW - margin - ibanW;
    const gap   = 3;
    doc.setFont('helvetica','bold');
    doc.text('IBAN :', valX-gap, y, {align:'right'});
    doc.setFont('helvetica','normal'); doc.text(prof.iban, valX, y);
    y += 5.5;
    if (prof.bic) {
      doc.setFont('helvetica','bold');
      doc.text('BIC :', valX-gap, y, {align:'right'});
      doc.setFont('helvetica','normal'); doc.text(prof.bic, valX, y);
      y += 16;
    }
  }

  const mm = String(month).padStart(2,'0');
  doc.save(`${prof.prenom} ${prof.nom} - ${code}-${mm}-${year}.pdf`);
}
</script>
</body>
</html>
