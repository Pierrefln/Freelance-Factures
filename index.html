<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factures Bpifrance</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f2f7;
      --surface: #ffffff;
      --border:  #e2e5ed;
      --text:    #0f1623;
      --muted:   #68748a;
      --accent:  #4560d6;
      --acc-bg:  #eef1fb;
      --danger:  #dc2626;
      --dbg:     #fef2f2;
      --radius:  9px;
      --shadow:  0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.05);
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: linear-gradient(160deg, #0b1437 0%, #162050 100%);
      padding: 20px 32px 18px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    header h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -.2px; }
    header p  { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 5px; }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      max-width: 760px;
      margin: 26px auto;
      padding: 0 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
    }
    .section-title {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .75px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Period ──────────────────────────────────────────── */
    .period-top { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; margin-bottom: 16px; justify-content: center; }
    .cal-header { text-align: center; }
    .cal-grid { margin: 0 auto; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11.5px; font-weight: 500; color: var(--muted); }

    select, input[type="number"] {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    select:focus, input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(69,96,214,.12);
    }

    /* ── Calendar ────────────────────────────────────────── */
    .cal-header {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      max-width: 286px;
    }
    .cal-head {
      text-align: center;
      font-size: 10.5px;
      font-weight: 600;
      color: #b0b8cc;
      padding: 4px 0 6px;
    }
    .cal-day {
      text-align: center;
      padding: 5px 2px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background .1s, color .1s;
      user-select: none;
    }
    .cal-day:hover  { background: var(--acc-bg); }
    .cal-day.today  { color: var(--accent); font-weight: 600; }
    .cal-day.sel    { background: var(--accent); color: #fff; font-weight: 600; border-radius: 6px; }

    /* ── Invoice rows ─────────────────────────────────────── */
    #rows-container { display: flex; flex-direction: column; gap: 10px; }

    .inv-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 15px;
      background: #fcfcfe;
      transition: border-color .15s;
    }
    .inv-card:focus-within { border-color: #9aaae8; }

    .row-top { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }

    .row-idx {
      width: 22px; height: 22px;
      border: 1px solid var(--border);
      border-radius: 50%;
      font-size: 11px; font-weight: 600; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; align-self: center;
    }

    /* ── Autocomplete ─────────────────────────────────────── */
    .ac-wrap { position: relative; flex: 1 1 260px; }
    .ac-wrap label { font-size: 11.5px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 5px; }

    .ac-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font: inherit; color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .ac-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(69,96,214,.12); }
    .ac-input.selected { font-weight: 500; }

    .ac-drop {
      display: none;
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 6px 24px rgba(0,0,0,.11);
      z-index: 200;
      max-height: 250px;
      overflow-y: auto;
    }
    .ac-drop.open { display: block; }
    .ac-item {
      padding: 9px 12px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #f3f4f6;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.hi { background: var(--acc-bg); }
    .ac-code { font-family: monospace; font-size: 11px; font-weight: 700; color: var(--accent); min-width: 50px; }
    .ac-name { font-size: 13px; }
    .ac-empty { padding: 12px; text-align: center; color: var(--muted); font-size: 13px; }

    .field-days { width: 80px; }
    .field-days input { width: 100%; }

    .row-total { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; padding-bottom: 1px; min-width: 70px; text-align: right; }

    .btn-remove {
      background: none; border: none; cursor: pointer; color: #d1d5db;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s; flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--danger); background: var(--dbg); }

    .desc-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 9px; background: none; border: none; cursor: pointer;
      font: inherit; font-size: 12px; color: var(--muted); padding: 0;
      transition: color .15s;
    }
    .desc-toggle:hover { color: var(--accent); }

    .desc-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .desc-box label { font-size: 11.5px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 6px; }
    .desc-box textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font: inherit; font-size: 13px; color: var(--text);
      resize: vertical; min-height: 110px; outline: none; line-height: 1.65;
      transition: border-color .15s, box-shadow .15s;
    }
    .desc-box textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(69,96,214,.12); }
    .desc-hint { font-size: 11px; color: #b0b8c8; margin-top: 4px; }

    /* ── Signature pad ────────────────────────────────────── */
    .sig-pad-wrap { position: relative; }

    #sig-canvas {
      display: block;
      width: 100%;
      height: 130px;
      border: 1.5px dashed #d0d6e8;
      border-radius: 7px;
      cursor: crosshair;
      background: #f9fafc;
      touch-action: none;
    }
    #sig-canvas.has-sig { border-style: solid; border-color: var(--border); }

    .sig-hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12.5px; color: #c0c8d8;
      pointer-events: none;
      text-align: center;
      line-height: 1.5;
    }
    .sig-actions {
      display: flex; gap: 8px; margin-top: 8px; align-items: center;
    }
    .sig-info { font-size: 11.5px; color: var(--muted); margin-top: 6px; }

    /* ── Empty state ──────────────────────────────────────── */
    #empty-state { text-align: center; padding: 26px; color: var(--muted); font-size: 13px; }

    /* ── Bottom bar ───────────────────────────────────────── */
    .bottom-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .bottom-left { display: flex; align-items: center; gap: 14px; }
    #summary { font-size: 12.5px; color: var(--muted); }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn { border-radius: 6px; cursor: pointer; font: inherit; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent; transition: all .15s; }
    .btn-outline { background: #fff; border-color: var(--border); color: var(--text); padding: 7px 13px; font-size: 13px; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--acc-bg); }
    .btn-ghost { background: none; border: none; cursor: pointer; font: inherit; font-size: 12px; color: var(--muted); padding: 0; transition: color .15s; }
    .btn-ghost:hover { color: var(--danger); }
    .btn-gen { background: var(--accent); color: #fff; padding: 9px 24px; font-size: 14px; font-weight: 600; border: none; box-shadow: 0 2px 6px rgba(69,96,214,.3); }
    .btn-gen:hover { background: #3450c2; }
    .btn-gen:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast { position: fixed; bottom: 20px; right: 20px; background: #1a2033; color: #fff; border-radius: 8px; padding: 11px 16px; font-size: 13px; max-width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,.22); opacity: 0; transform: translateY(8px); transition: all .22s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { border-left: 3px solid #22c55e; }
    #toast.err { border-left: 3px solid var(--danger); }

    @media (max-width: 520px) {
      header { padding: 16px; }
      main { margin: 16px auto; }
      .bottom-bar { flex-direction: column; align-items: stretch; }
      .btn-gen { justify-content: center; }
    }
  </style>
</head>

// ── State ─────────────────────────────────────────────────────────────
let rowId      = 0;
const rowState = {};
let invoiceDay = new Date().getDate();
let sigDataUrl = localStorage.getItem('sig') || null;
let sigCtx     = null;
let sigDrawing = false;
let sigHasDraw = false;

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const t = new Date();
  document.getElementById('sel-month').value = t.getMonth() + 1;
  document.getElementById('inp-year').value  = t.getFullYear();
  renderCalendar();
  setupCanvas();
  addRow();
});

// ── Formatters ────────────────────────────────────────────────────────
function fmtUI(v)  { return v.toLocaleString('fr-FR') + '\u00a0\u20ac'; }
function fmtPDF(v) {
  const s = Math.round(v);
  return (s >= 1000
    ? Math.floor(s/1000) + ' ' + String(s%1000).padStart(3,'0')
    : String(s)) + ' \u20ac';
}
function lastDay(y, m) { return new Date(y, m, 0).getDate(); }
function getMonth() { return parseInt(document.getElementById('sel-month').value); }
function getYear()  { return parseInt(document.getElementById('inp-year').value); }

// ── Calendar ──────────────────────────────────────────────────────────
function renderCalendar() {
  const month = getMonth(), year = getYear();
  const ld = lastDay(year, month);
  if (invoiceDay > ld) invoiceDay = ld;

  // Month label
  document.getElementById('cal-title').textContent =
    `Jour de la facture — ${MONTHS_CAP[month-1]} ${year}`;

  // Day-of-week for 1st (Monday=0)
  const firstDow = (new Date(year, month-1, 1).getDay() + 6) % 7;

  const today = new Date();
  const tD = today.getDate(), tM = today.getMonth()+1, tY = today.getFullYear();

  const heads = ['L','M','M','J','V','S','D'].map(d =>
    `<div class="cal-head">${d}</div>`).join('');

  const blanks = Array(firstDow).fill('<div></div>').join('');

  const days = Array.from({length: ld}, (_,i) => {
    const d = i + 1;
    const cls = d === invoiceDay ? 'cal-day sel'
              : (d === tD && month === tM && year === tY) ? 'cal-day today'
              : 'cal-day';
    return `<div class="${cls}" onclick="selectDay(${d})">${d}</div>`;
  }).join('');

  document.getElementById('cal-grid').innerHTML = heads + blanks + days;
}

function selectDay(d) { invoiceDay = d; renderCalendar(); }

// ── Default description ───────────────────────────────────────────────
function defaultDesc(name) {
  return `Prestations de consultant dans le cadre du projet ${name}. Ces Prestations recouvrent notamment le p\u00e9rim\u00e8tre suivant :
- Mise en valeur des soci\u00e9t\u00e9s europ\u00e9ennes innovantes sur le service EuroQuity
- Support \u00e0 l'animation de pr\u00e9sentations en ligne ou en public relatifs \u00e0 des projets europ\u00e9ens et \u00e0 d'autres op\u00e9rations, de promotion et de communication du service EuroQuity et de son environnement
- Support \u00e0 la coordination du projet et \u00e0 l'animation des partenaires du service EuroQuity`;
}

// ── Row management ────────────────────────────────────────────────────
function addRow() {
  const id = ++rowId;
  rowState[id] = { code: '', days: 5, descEdited: false };

  const idx  = Object.keys(rowState).length;
  const card = document.createElement('div');
  card.className = 'inv-card';
  card.id = `card-${id}`;
  card.innerHTML = `
    <div class="row-top">
      <div class="row-idx" id="idx-${id}">${idx}</div>
      <div class="ac-wrap">
        <label>Projet</label>
        <input class="ac-input" id="ac-${id}" type="text"
               placeholder="Tapez un nom ou un code..."
               autocomplete="off"
               oninput="acInput(${id},this.value)"
               onfocus="acOpen(${id})"
               onblur="setTimeout(()=>acClose(${id}),160)"
               onkeydown="acKey(${id},event)" />
        <div class="ac-drop" id="drop-${id}"></div>
      </div>
      <div class="field field-days">
        <label>Jours</label>
        <input type="number" id="days-${id}" value="5" min="1" max="31" step="1"
               oninput="setDays(${id},this.value)" />
      </div>
      <div class="row-total" id="total-${id}"></div>
      <button class="btn-remove" onclick="removeRow(${id})" title="Supprimer">&#x2715;</button>
    </div>
    <button class="desc-toggle" id="dtoggle-${id}" onclick="toggleDesc(${id})">
      <span id="dicon-${id}">\u203a</span>
      <span id="dlabel-${id}">Modifier la description</span>
    </button>
    <div class="desc-box" id="dbox-${id}" hidden>
      <label>Description des prestations</label>
      <textarea id="dtxt-${id}"
                oninput="rowState[${id}].descEdited=true"
                placeholder="S\u00e9lectionnez un projet pour pr\u00e9-remplir automatiquement."></textarea>
      <div class="desc-hint">Pr\u00e9-remplie \u00e0 la s\u00e9lection du projet &mdash; modifiable librement.</div>
    </div>
  `;
  document.getElementById('rows-container').appendChild(card);
  refreshEmpty();
  refreshSummary();
  document.getElementById(`ac-${id}`).focus();
}

function removeRow(id) {
  delete rowState[id];
  document.getElementById(`card-${id}`).remove();
  let i = 1;
  document.querySelectorAll('.row-idx').forEach(el => el.textContent = i++);
  refreshEmpty();
  refreshSummary();
}

function refreshEmpty() {
  document.getElementById('empty-state').style.display =
    Object.keys(rowState).length === 0 ? 'block' : 'none';
}
function refreshSummary() {
  const valid = Object.values(rowState).filter(r => r.code && r.days > 0);
  const sum   = valid.reduce((s,r) => s + r.days * PRIX_HT, 0);
  document.getElementById('summary').textContent = valid.length
    ? `${valid.length} facture${valid.length>1?'s':''} \u00b7 ${fmtUI(sum)}`
    : '';
}
function setDays(id, val) {
  const d = parseInt(val) || 0;
  rowState[id].days = d;
  document.getElementById(`total-${id}`).textContent =
    (rowState[id].code && d > 0) ? fmtUI(d * PRIX_HT) : '';
  refreshSummary();
}

// ── Description toggle ────────────────────────────────────────────────
function toggleDesc(id) {
  const box  = document.getElementById(`dbox-${id}`);
  const open = box.hidden;
  box.hidden = !open;
  document.getElementById(`dicon-${id}`).textContent  = open ? '\u2304' : '\u203a';
  document.getElementById(`dlabel-${id}`).textContent = open ? 'Masquer' : 'Modifier la description';
}

// ── Autocomplete ──────────────────────────────────────────────────────
const acHi = {};
function acMatches(q) {
  const l = q.trim().toLowerCase();
  if (!l) return Object.entries(PROJECTS).sort(([a],[b]) => a.localeCompare(b));
  return Object.entries(PROJECTS)
    .filter(([c,n]) => c.toLowerCase().includes(l) || n.toLowerCase().includes(l))
    .sort(([a],[b]) => {
      const ma = a.toLowerCase().startsWith(l), mb = b.toLowerCase().startsWith(l);
      return ma === mb ? a.localeCompare(b) : ma ? -1 : 1;
    }).slice(0, 10);
}
function renderDrop(id, q) {
  const drop = document.getElementById(`drop-${id}`);
  const list = acMatches(q);
  acHi[id] = -1;
  if (!list.length) { drop.innerHTML = '<div class="ac-empty">Aucun r\u00e9sultat</div>'; return; }
  drop.innerHTML = list.map(([code,name]) =>
    `<div class="ac-item" data-code="${code}" data-name="${name.replace(/"/g,'&quot;')}"
          onmousedown="pickProject(${id},'${code}','${name.replace(/'/g,"\\'")}')">
       <span class="ac-code">${code}</span><span class="ac-name">${name}</span>
     </div>`).join('');
}
function acInput(id,val) {
  rowState[id].code=''; document.getElementById(`ac-${id}`).classList.remove('selected');
  document.getElementById(`total-${id}`).textContent='';
  renderDrop(id,val); document.getElementById(`drop-${id}`).classList.add('open');
  refreshSummary();
}
function acOpen(id)  { renderDrop(id, document.getElementById(`ac-${id}`).value); document.getElementById(`drop-${id}`).classList.add('open'); }
function acClose(id) { document.getElementById(`drop-${id}`).classList.remove('open'); }
function acKey(id,e) {
  const items = document.getElementById(`drop-${id}`).querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key==='ArrowDown') { e.preventDefault(); acHi[id]=Math.min((acHi[id]??-1)+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('hi',i===acHi[id])); }
  else if (e.key==='ArrowUp') { e.preventDefault(); acHi[id]=Math.max((acHi[id]??0)-1,0); items.forEach((el,i)=>el.classList.toggle('hi',i===acHi[id])); }
  else if (e.key==='Enter'&&acHi[id]>=0) { e.preventDefault(); const it=items[acHi[id]]; pickProject(id,it.dataset.code,it.dataset.name); }
  else if (e.key==='Escape') acClose(id);
}
function pickProject(id,code,name) {
  rowState[id].code=code;
  const inp=document.getElementById(`ac-${id}`);
  inp.value=`${code} \u2013 ${name}`; inp.classList.add('selected');
  acClose(id);
  const d=rowState[id].days;
  document.getElementById(`total-${id}`).textContent = d>0 ? fmtUI(d*PRIX_HT) : '';
  if (!rowState[id].descEdited) document.getElementById(`dtxt-${id}`).value = defaultDesc(name);
  refreshSummary();
}

// ── Signature canvas ──────────────────────────────────────────────────
function setupCanvas() {
  const canvas = document.getElementById('sig-canvas');
  const dpr    = window.devicePixelRatio || 1;
  const cssW   = canvas.clientWidth;
  const cssH   = canvas.clientHeight;

  canvas.width  = cssW * dpr;
  canvas.height = cssH * dpr;

  sigCtx = canvas.getContext('2d');
  sigCtx.scale(dpr, dpr);
  sigCtx.strokeStyle = '#111827';
  sigCtx.lineWidth   = 1.8;
  sigCtx.lineCap     = 'round';
  sigCtx.lineJoin    = 'round';

  // Restore saved signature (or default)
  const stored = localStorage.getItem('sig');
  if (stored) {
    sigDataUrl = stored;
    loadImgOnCanvas(stored, cssW, cssH);
  } else {
    // Load default signature
    sigDataUrl = 'data:image/png;base64,' + DEFAULT_SIG;
    loadImgOnCanvas(sigDataUrl, cssW, cssH);
  }

  // Mouse
  canvas.addEventListener('mousedown',  sigStart);
  canvas.addEventListener('mousemove',  sigMove);
  canvas.addEventListener('mouseup',    sigEnd);
  canvas.addEventListener('mouseleave', sigEnd);
  // Touch
  canvas.addEventListener('touchstart', e => { e.preventDefault(); sigStart(e.touches[0]); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); sigMove(e.touches[0]);  }, { passive: false });
  canvas.addEventListener('touchend',   sigEnd);
}

function loadImgOnCanvas(src, w, h) {
  const img = new Image();
  img.onload = () => {
    sigCtx.drawImage(img, 0, 0, w, h);
    document.getElementById('sig-canvas').classList.add('has-sig');
    document.getElementById('sig-hint').style.display = 'none';
    sigHasDraw = true;
  };
  img.src = src;
}

function getPos(e) {
  const r = document.getElementById('sig-canvas').getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function sigStart(e) {
  sigDrawing = true;
  const p = getPos(e);
  sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y);
}
function sigMove(e) {
  if (!sigDrawing) return;
  const p = getPos(e);
  sigCtx.lineTo(p.x, p.y); sigCtx.stroke();
  if (!sigHasDraw) {
    sigHasDraw = true;
    document.getElementById('sig-canvas').classList.add('has-sig');
    document.getElementById('sig-hint').style.display = 'none';
  }
}
function sigEnd() {
  if (!sigDrawing) return;
  sigDrawing = false;
  sigDataUrl = document.getElementById('sig-canvas').toDataURL('image/png');
  try { localStorage.setItem('sig', sigDataUrl); } catch(_) {}
}
function clearCanvas() {
  const canvas = document.getElementById('sig-canvas');
  const r = canvas.getBoundingClientRect();
  sigCtx.clearRect(0, 0, r.width, r.height);
  sigHasDraw = false;
  sigDataUrl = null;
  localStorage.removeItem('sig');
  canvas.classList.remove('has-sig');
  document.getElementById('sig-hint').style.display = 'block';
}

// ── Toast ─────────────────────────────────────────────────────────────
let _tt;
function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(_tt); _tt = setTimeout(() => el.className='', 3200);
}

// ── Generate ──────────────────────────────────────────────────────────
async function generateAll() {
  const valid = Object.entries(rowState)
    .map(([id,s]) => ({id:+id,...s}))
    .filter(r => r.code && r.days > 0);
  if (!valid.length) { showToast('S\u00e9lectionnez au moins un projet.','err'); return; }

  const month=getMonth(), year=getYear(), day=invoiceDay;
  const btn=document.getElementById('btn-gen');
  btn.disabled=true; btn.textContent='G\u00e9n\u00e9ration\u2026';

  let count=0;
  for (const r of valid) {
    try {
      const desc = document.getElementById(`dtxt-${r.id}`).value.trim();
      buildPDF(r.code, PROJECTS[r.code], r.days, month, year, day, desc);
      count++;
      await new Promise(res => setTimeout(res,700));
    } catch(e) { showToast(`Erreur ${r.code}: ${e.message}`,'err'); }
  }
  btn.disabled=false; btn.textContent='G\u00e9n\u00e9rer les PDF';
  if (count) showToast(`${count} PDF t\u00e9l\u00e9charg\u00e9${count>1?'s':''} \u2713`);
}

// ── Build PDF ─────────────────────────────────────────────────────────
function buildPDF(code, name, days, month, year, invoiceDay, descTxt) {
  const { jsPDF } = window.jspdf;
  const doc    = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pW     = doc.internal.pageSize.getWidth();
  const margin = 22;
  const usable = pW - 2 * margin;

  const mName  = MONTHS_FR[month-1];
  const ld     = lastDay(year, month);
  const invNum = `${code}-${String(month).padStart(2,'0')}-${year}`;
  const total  = days * PRIX_HT;
  const daysStr = String(days);
  const description = descTxt || defaultDesc(name);

  // Sender
  let y = 15;
  doc.setFontSize(9);
  doc.setFont('helvetica','bold');   doc.text(SENDER.name, margin, y);
  doc.setFont('helvetica','normal');
  y+=5.5; doc.text(SENDER.line1, margin, y);
  y+=5.5; doc.text(SENDER.line2, margin, y);
  y+=9;   doc.text(`Tel : ${SENDER.tel}`, margin, y);
  y+=5.5; doc.text(`Email : ${SENDER.email}`, margin, y);
  y+=9;   doc.text(`N\u00b0 SIRET : ${SENDER.siret}`, margin, y);

  // Recipient
  const rx = pW - margin;
  doc.text(RECIPIENT.name,  rx, 40,   {align:'right'});
  doc.text(RECIPIENT.line1, rx, 45.5, {align:'right'});
  doc.text(RECIPIENT.line2, rx, 51,   {align:'right'});

  // PAIEMENT
  y = 67;
  const pm = 'PAIEMENT A FIN DU MOIS';
  doc.setFont('helvetica','bold'); doc.setTextColor(180,0,0);
  doc.text(pm, margin, y);
  const pmW = doc.getTextWidth(pm);
  doc.setDrawColor(180,0,0); doc.setLineWidth(0.3);
  doc.line(margin, y+0.8, margin+pmW, y+0.8);

  // Date
  doc.setTextColor(0); doc.setFont('helvetica','normal');
  doc.text(`Le ${invoiceDay} ${mName} ${year}`, rx, y, {align:'right'});

  // Title
  y += 18;
  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text(`Facture n\u00b0${invNum}`, pW/2, y, {align:'center'});
  y += 6;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(`P\u00e9riode du 1er ${mName} ${year} au ${ld} ${mName} ${year}`, pW/2, y, {align:'center'});
  y += 9;

  // Table
  doc.autoTable({
    startY: y,
    margin: {left:margin, right:margin},
    head: [['D\u00e9signation des prestations','Quantit\u00e9\n(en jours)','Prix HT\n(Hors Taxes)','Prix total HT\n(Hors Taxes)']],
    body: [[description, daysStr, fmtPDF(PRIX_HT), fmtPDF(total)]],
    columnStyles: {
      0: {cellWidth:usable*0.47, valign:'top'},
      1: {cellWidth:usable*0.17, halign:'center', valign:'top'},
      2: {cellWidth:usable*0.18, halign:'center', valign:'top'},
      3: {cellWidth:usable*0.18, halign:'center', valign:'top'},
    },
    headStyles: {fillColor:[245,246,250], textColor:[0,0,0], fontStyle:'bold', halign:'center', fontSize:8.5, lineColor:[0,0,0], lineWidth:0.3},
    bodyStyles: {minCellHeight:80, fontSize:9, lineColor:[0,0,0], lineWidth:0.3},
    styles: {cellPadding:5, overflow:'linebreak'},
  });

  y = doc.lastAutoTable.finalY;

  // Total row — separator aligned with col 1 end (47%)
  const rH = 11, sepX = margin + usable*0.47;
  doc.setDrawColor(0); doc.setLineWidth(0.3);
  doc.rect(margin, y, usable, rH);
  doc.line(sepX, y, sepX, y+rH);

  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(180,0,0);
  doc.text(pm, margin+4, y+7);
  const pmW2 = doc.getTextWidth(pm);
  doc.setDrawColor(180,0,0); doc.setLineWidth(0.25);
  doc.line(margin+4, y+7.7, margin+4+pmW2, y+7.7);

  doc.setTextColor(0); doc.setDrawColor(0); doc.setFont('helvetica','bold');
  doc.text(`Total (en euros HT)     ${fmtPDF(total)}`, rx-4, y+7, {align:'right'});
  y += rH+4;

  // TVA
  doc.setFont('helvetica','normal');
  doc.text('TVA Non applicable, art. 293 B du CGI', margin, y);
  y += 14;

  // IBAN / BIC (right-aligned to margin)
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  const ibanW = doc.getTextWidth(BANK.iban);
  const valX  = pW - margin - ibanW;
  const gap   = 3;
  doc.setFont('helvetica','bold');
  doc.text('IBAN :', valX-gap, y, {align:'right'});
  doc.setFont('helvetica','normal'); doc.text(BANK.iban, valX, y);
  y += 5.5;
  doc.setFont('helvetica','bold');
  doc.text('BIC :', valX-gap, y, {align:'right'});
  doc.setFont('helvetica','normal'); doc.text(BANK.bic, valX, y);
  y += 16;


  const mm = String(month).padStart(2,'0');
  doc.save(`Pierre-Alexis Fillon - ${code}-${mm}-${year}.pdf`);
}
